services:
  # ===========================================================================
  # CHROMADB - Vector Database
  # ===========================================================================
  chromadb:
    image: chromadb/chroma:latest
    container_name: sovereign-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
      - CHROMA_SERVER_AUTH_PROVIDER=
      - CHROMA_SERVER_AUTH_CREDENTIALS=
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================================================
  # MCP SERVER - Model Context Protocol API
  # ===========================================================================
  mcp-server:
    build:
      context: ./mcp_server
      dockerfile: Dockerfile
    container_name: sovereign-mcp-server
    ports:
      - "8081:8080"
    volumes:
      - ./:/workspace:ro # Read-only access to repo
      - /var/run/docker.sock:/var/run/docker.sock # For container introspection
    environment:
      - WORKSPACE_PATH=/workspace
      - PYTHONUNBUFFERED=1
    depends_on:
      - chromadb
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================================================
  # BACKEND API - FastAPI Application
  # ===========================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sovereign-backend
    ports:
      - "8001:8001"
    volumes:
      - ./:/workspace
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - CHROMA_HOST=http://chromadb:8000
      - MCP_SERVER_HOST=http://mcp-server:8080
      - WORKSPACE_PATH=/workspace
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    depends_on:
      - chromadb
      - mcp-server
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8001/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  chroma_data:
    driver: local

networks:
  default:
    name: sovereign-network
